<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 FPS 경쟁 타이틀 대시보드</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0a0e1a;
  --card: #131a2e;
  --navy-light: #1a2540;
  --navy-mid: #0f1626;
  --orange: #ff6b2b;
  --orange-glow: #ff8c4c;
  --text: #e8eaf0;
  --text-muted: #8a92a6;
  --cyan: #38bdf8;
  --green: #34d399;
  --red: #f87171;
  --border: rgba(255,255,255,0.07);
  --purple: #a78bfa;
  --yellow: #facc15;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans KR', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ─── HEADER ─── */
.header {
  background: linear-gradient(180deg, #0d1220 0%, transparent 100%);
  border-bottom: 1px solid var(--border);
  padding: 20px 40px 16px;
  position: sticky;
  top: 0;
  z-index: 100;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}

.header-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
}

.logo {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.logo-badge {
  font-family: 'Outfit', sans-serif;
  font-size: 0.65em;
  font-weight: 600;
  color: var(--orange);
  letter-spacing: 0.15em;
  text-transform: uppercase;
}

.logo-title {
  font-family: 'Outfit', sans-serif;
  font-size: 1.25em;
  font-weight: 800;
  color: var(--text);
}

.header-stats {
  display: flex;
  gap: 20px;
  align-items: center;
}

.stat-pill {
  display: flex;
  align-items: center;
  gap: 6px;
  font-family: 'Outfit', sans-serif;
  font-size: 0.75em;
  color: var(--text-muted);
}

.stat-pill strong {
  font-size: 1.1em;
  color: var(--text);
}

.stat-pill .dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
}

.dot-aaa { background: var(--orange); }
.dot-aa { background: var(--cyan); }
.dot-a { background: var(--green); }
.dot-indie { background: var(--text-muted); }

/* ─── FILTER GROUPS ─── */
.filter-group {
  margin-bottom: 12px;
}

.filter-label {
  font-family: 'Outfit', sans-serif;
  font-size: 0.65em;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 8px;
  display: block;
}

.filter-bar {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}

.filter-btn {
  font-family: 'Outfit', sans-serif;
  font-size: 0.78em;
  font-weight: 600;
  padding: 6px 18px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-muted);
  cursor: pointer;
  transition: all 0.18s;
  letter-spacing: 0.03em;
}

.filter-btn:hover {
  color: var(--text);
  border-color: rgba(255,255,255,0.2);
}

.filter-btn.active {
  background: var(--orange);
  border-color: var(--orange);
  color: #fff;
}

.filter-btn.active.f-aa {
  background: var(--cyan);
  border-color: var(--cyan);
  color: #0a0e1a;
}

.filter-btn.active.f-a {
  background: var(--green);
  border-color: var(--green);
  color: #0a0e1a;
}

.filter-btn.active.f-indie {
  background: var(--text-muted);
  border-color: var(--text-muted);
  color: #0a0e1a;
}

.filter-btn.active.f-stage {
  background: var(--purple);
  border-color: var(--purple);
  color: #fff;
}

.filter-divider {
  width: 1px;
  height: 18px;
  background: var(--border);
  margin: 0 4px;
}

.search-input {
  margin-left: auto;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 6px 16px;
  color: var(--text);
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 0.78em;
  outline: none;
  width: 200px;
  transition: border-color 0.18s;
}

.search-input::placeholder {
  color: var(--text-muted);
}

.search-input:focus {
  border-color: var(--orange);
}

/* ─── MAIN LAYOUT ─── */
.main {
  padding: 24px 40px;
  transition: margin-right 0.3s;
}

.main.panel-open {
  margin-right: 500px;
}

.section-label {
  font-family: 'Outfit', sans-serif;
  font-size: 0.7em;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.section-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

.section-count {
  font-size: 0.85em;
  color: var(--orange);
  background: rgba(255,107,43,0.1);
  padding: 1px 8px;
  border-radius: 10px;
}

/* ─── CARD GRID ─── */
.card-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 14px;
  margin-bottom: 32px;
}

.game-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  cursor: pointer;
  transition: transform 0.18s, border-color 0.18s, box-shadow 0.18s;
  position: relative;
  overflow: hidden;
}

.card-thumbnail {
  width: 100%;
  height: 160px;
  background: var(--navy-light);
  overflow: hidden;
  position: relative;
}

.card-thumbnail img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: transform 0.3s;
}

.game-card:hover .card-thumbnail img {
  transform: scale(1.05);
}

.card-thumbnail .no-img {
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-muted);
  font-size: 0.7em;
  opacity: 0.5;
}

.card-content {
  padding: 14px 18px 16px;
}

.game-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 2px;
  background: transparent;
  transition: background 0.18s;
}

.game-card:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(0,0,0,0.3);
}

.game-card:hover::before {
  background: var(--card-accent, var(--orange));
}

.game-card.active {
  border-color: var(--card-accent, var(--orange));
}

.game-card.active::before {
  background: var(--card-accent, var(--orange));
}

.card-tier {
  font-family: 'Outfit', sans-serif;
  font-size: 0.6em;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: 10px;
  display: inline-block;
  margin-bottom: 10px;
  letter-spacing: 0.06em;
}

.tier-aaa { background: rgba(255,107,43,0.15); color: var(--orange); }
.tier-aa { background: rgba(56,189,248,0.12); color: var(--cyan); }
.tier-a { background: rgba(52,211,153,0.12); color: var(--green); }
.tier-indie { background: rgba(138,146,166,0.12); color: var(--text-muted); }

.card-name {
  font-family: 'Outfit', sans-serif;
  font-size: 1.0em;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 4px;
  line-height: 1.3;
}

.card-dev {
  font-size: 0.7em;
  color: var(--text-muted);
  margin-bottom: 12px;
}

.dev-tooltip-wrap {
  position: relative;
  display: inline;
  cursor: help;
  border-bottom: 1px dotted var(--text-muted);
}

.dev-tooltip-wrap .dev-tooltip {
  display: none;
  position: absolute;
  bottom: calc(100% + 8px);
  left: 50%;
  transform: translateX(-50%);
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 14px;
  min-width: 220px;
  max-width: 320px;
  z-index: 1000;
  box-shadow: 0 8px 24px rgba(0,0,0,0.5);
  font-size: 0.95em;
  line-height: 1.5;
  color: var(--text-secondary);
  white-space: normal;
  pointer-events: none;
}

.dev-tooltip-wrap .dev-tooltip::after {
  content: '';
  position: absolute;
  top: 100%;
  left: 50%;
  transform: translateX(-50%);
  border: 6px solid transparent;
  border-top-color: var(--border);
}

.dev-tooltip-wrap:hover .dev-tooltip {
  display: block;
}

.dev-tooltip strong {
  color: var(--text-primary);
  font-size: 1.05em;
  display: block;
  margin-bottom: 4px;
}

.dev-tooltip .prev-label {
  color: var(--accent);
  font-size: 0.85em;
  font-weight: 600;
  margin-bottom: 2px;
}

.card-meta {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.meta-chip {
  font-family: 'Outfit', sans-serif;
  font-size: 0.62em;
  padding: 3px 8px;
  border-radius: 6px;
  background: var(--navy-light);
  color: var(--text-muted);
  display: flex;
  align-items: center;
  gap: 4px;
}

.meta-chip svg {
  flex-shrink: 0;
}

.chip-release {
  color: var(--text);
}

.chip-bm-f2p {
  color: var(--green);
  background: rgba(52,211,153,0.1);
}

.chip-bm-b2p {
  color: var(--orange);
  background: rgba(255,107,43,0.1);
}

.chip-status-live {
  color: var(--green);
}

/* ─── FOLLOWERS CHIP ─── */
.chip-followers {
  color: var(--cyan);
  background: rgba(56,189,248,0.1);
}

/* ─── STAGE BADGE ─── */
.stage-badge {
  font-family: 'Outfit', sans-serif;
  font-size: 0.58em;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: 10px;
  display: inline-block;
  letter-spacing: 0.04em;
}
.stage-launched { background: rgba(52,211,153,0.15); color: var(--green); }
.stage-alpha { background: rgba(255,107,43,0.12); color: var(--orange); }
.stage-beta { background: rgba(250,204,21,0.12); color: var(--yellow); }
.stage-demo { background: rgba(56,189,248,0.12); color: var(--cyan); }
.stage-dev { background: rgba(138,146,166,0.12); color: var(--text-muted); }
.stage-delayed { background: rgba(248,113,113,0.12); color: var(--red); }
.stage-unannounced { background: rgba(167,139,250,0.12); color: var(--purple); }

.card-genre {
  font-size: 0.67em;
  color: var(--text-muted);
  margin-top: 10px;
  padding-top: 10px;
  border-top: 1px solid var(--border);
}

/* ─── CARD EXTRA ROW (followers + stage) ─── */
.card-extra-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 10px;
  padding-top: 10px;
  border-top: 1px solid var(--border);
}

/* ─── DETAIL PANEL ─── */
.detail-panel {
  position: fixed;
  top: 0;
  right: -500px;
  width: 500px;
  height: 100vh;
  background: var(--navy-mid);
  border-left: 1px solid var(--border);
  z-index: 200;
  transition: right 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.detail-panel.open {
  right: 0;
}

.panel-gallery {
  position: relative;
  width: 100%;
  height: 320px;
  background: var(--navy-light);
  overflow: hidden;
}

.gallery-container {
  position: relative;
  width: 100%;
  height: 100%;
}

.gallery-image {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: cover;
  opacity: 0;
  transition: opacity 0.3s;
}

.gallery-image.active {
  opacity: 1;
}

.gallery-controls {
  position: absolute;
  bottom: 10px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 6px;
  z-index: 10;
}

.gallery-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: rgba(255,255,255,0.4);
  cursor: pointer;
  transition: background 0.2s;
}

.gallery-dot.active {
  background: var(--orange);
}

.gallery-nav {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  width: 32px;
  height: 32px;
  background: rgba(0,0,0,0.5);
  border: none;
  color: white;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  transition: background 0.2s;
  z-index: 9;
}

.gallery-nav:hover {
  background: rgba(0,0,0,0.8);
}

.gallery-nav.prev {
  left: 10px;
}

.gallery-nav.next {
  right: 10px;
}

.panel-header {
  padding: 20px 24px 16px;
  border-bottom: 1px solid var(--border);
  background: var(--card);
  flex-shrink: 0;
}

.panel-close {
  position: absolute;
  top: 16px;
  right: 16px;
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: var(--navy-light);
  border: none;
  color: var(--text-muted);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  transition: background 0.15s, color 0.15s;
  z-index: 11;
}

.panel-close:hover {
  background: var(--orange);
  color: #fff;
}

.panel-tier {
  margin-bottom: 8px;
}

.panel-title {
  font-family: 'Outfit', sans-serif;
  font-size: 1.4em;
  font-weight: 800;
  color: var(--text);
  margin-bottom: 4px;
  padding-right: 36px;
  line-height: 1.25;
}

.panel-genre-tag {
  font-size: 0.72em;
  color: var(--text-muted);
}

.panel-body {
  flex: 1;
  overflow-y: auto;
  padding: 20px 24px;
  scrollbar-width: thin;
  scrollbar-color: var(--navy-light) transparent;
}

.panel-body::-webkit-scrollbar {
  width: 4px;
}

.panel-body::-webkit-scrollbar-track {
  background: transparent;
}

.panel-body::-webkit-scrollbar-thumb {
  background: var(--navy-light);
  border-radius: 2px;
}

.panel-meta-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 20px;
}

.panel-meta-item {
  background: var(--card);
  border-radius: 8px;
  padding: 10px 12px;
}

.panel-meta-label {
  font-family: 'Outfit', sans-serif;
  font-size: 0.58em;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--text-muted);
  margin-bottom: 4px;
}

.panel-meta-value {
  font-size: 0.78em;
  color: var(--text);
  font-weight: 500;
  word-break: break-word;
}

.panel-section {
  margin-bottom: 18px;
}

.panel-section-title {
  font-family: 'Outfit', sans-serif;
  font-size: 0.62em;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--orange);
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.panel-section-title::after {
  content: '';
  flex: 1;
  height: 1px;
  background: rgba(255,107,43,0.2);
}

.panel-section-title.dev-response {
  color: var(--cyan);
}

.panel-section-title.dev-response::after {
  background: rgba(56,189,248,0.2);
}

.milestone-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.milestone-item {
  display: flex;
  gap: 10px;
  align-items: flex-start;
}

.milestone-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--orange);
  margin-top: 5px;
  flex-shrink: 0;
}

.milestone-text {
  font-size: 0.75em;
  color: var(--text-muted);
  line-height: 1.4;
}

.milestone-text.current {
  color: var(--orange);
  font-weight: 500;
}

.feedback-list {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.feedback-item {
  font-size: 0.75em;
  line-height: 1.45;
  padding: 8px 10px;
  border-radius: 6px;
}

.feedback-positive {
  background: rgba(52,211,153,0.08);
  color: #a7f3d0;
  border-left: 3px solid var(--green);
}

.feedback-positive::before {
  content: "▲ ";
  color: var(--green);
  font-size: 0.8em;
  font-weight: bold;
}

.feedback-concern {
  background: rgba(248,113,113,0.08);
  color: #fecaca;
  border-left: 3px solid var(--red);
}

.feedback-concern::before {
  content: "▼ ";
  color: var(--red);
  font-size: 0.8em;
  font-weight: bold;
}

.dev-box {
  background: rgba(56,189,248,0.07);
  border-left: 3px solid var(--cyan);
  border-radius: 0 8px 8px 0;
  padding: 10px 14px;
}

.dev-label {
  font-family: 'Outfit', sans-serif;
  font-size: 0.58em;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--cyan);
  margin-bottom: 4px;
}

.dev-text {
  font-size: 0.73em;
  color: var(--text-muted);
  line-height: 1.5;
}

/* ─── STEAM DATA ─── */
.steam-data-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}
.steam-stat {
  background: rgba(56,189,248,0.06);
  border: 1px solid rgba(56,189,248,0.1);
  border-radius: 8px;
  padding: 8px 10px;
}
.steam-stat-label {
  font-family: 'Outfit', sans-serif;
  font-size: 0.55em;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--text-muted);
  margin-bottom: 3px;
}
.steam-stat-value {
  font-family: 'Outfit', sans-serif;
  font-size: 0.78em;
  font-weight: 700;
  color: var(--cyan);
}
.steam-stat-value.stat-green { color: var(--green); }
.steam-stat-value.stat-yellow { color: #facc15; }
.steam-stat-value.stat-muted { color: var(--text-muted); }
.panel-section-title svg { flex-shrink: 0; }

/* ─── EMPTY STATE ─── */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-muted);
}

.empty-state svg {
  opacity: 0.3;
  margin-bottom: 12px;
}

.empty-state p {
  font-size: 0.85em;
}

/* ─── OVERLAY ─── */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  z-index: 190;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s;
}

.overlay.visible {
  opacity: 1;
  pointer-events: all;
}

/* ─── VIEW TOGGLE ─── */
.view-toggle {
  display: flex;
  gap: 2px;
  background: var(--card);
  border-radius: 8px;
  padding: 2px;
  border: 1px solid var(--border);
}
.view-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 30px; height: 28px;
  border: none;
  border-radius: 6px;
  background: transparent;
  color: var(--text-muted);
  cursor: pointer;
  transition: all 0.15s;
}
.view-btn:hover { color: var(--text); }
.view-btn.active { background: var(--orange); color: #fff; }

/* ─── CALENDAR ─── */
.cal-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; flex-wrap:wrap; gap:12px; }
.cal-nav { display:flex; align-items:center; gap:12px; }
.cal-nav-btn { background:var(--card); border:1px solid var(--border); border-radius:8px; color:var(--text); width:32px; height:32px; display:flex; align-items:center; justify-content:center; cursor:pointer; transition:all 0.15s; font-size:1em; }
.cal-nav-btn:hover { border-color:var(--orange); color:var(--orange); }
.cal-month-label { font-family:'Outfit',sans-serif; font-size:1.2em; font-weight:700; color:var(--text); min-width:160px; text-align:center; }
.cal-legend { display:flex; gap:14px; flex-wrap:wrap; }
.cal-legend-item { display:flex; align-items:center; gap:5px; font-family:'Outfit',sans-serif; font-size:0.65em; color:var(--text-muted); }
.cal-legend-dot { width:8px; height:8px; border-radius:2px; }
.cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:4px; }
.cal-day-header { font-family:'Outfit',sans-serif; font-size:0.65em; font-weight:700; color:var(--text-muted); text-align:center; padding:8px 0; text-transform:uppercase; letter-spacing:0.1em; }
.cal-cell { background:var(--card); border:1px solid var(--border); border-radius:8px; min-height:90px; padding:6px; position:relative; transition:border-color 0.15s; }
.cal-cell:hover { border-color:rgba(255,255,255,0.15); }
.cal-cell.empty { background:transparent; border-color:transparent; }
.cal-cell.today { border-color:var(--orange); box-shadow:0 0 8px rgba(255,107,43,0.2); }

.cal-cell.today .cal-date { color:var(--orange); }
.cal-games { display:flex; flex-direction:column; gap:3px; }

.cal-game-chip:hover { filter:brightness(1.3); transform:translateX(2px); }

.cal-game-chip.t-aa { background:rgba(56,189,248,0.15); color:var(--cyan); }
.cal-game-chip.t-a { background:rgba(52,211,153,0.15); color:var(--green); }

.cal-game-chip.released { opacity:0.6; }

.cal-quarter-label { font-family:'Outfit',sans-serif; font-size:0.68em; font-weight:700; letter-spacing:0.12em; text-transform:uppercase; color:var(--text-muted); margin-bottom:12px; padding-bottom:6px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:10px; }
.cal-quarter-label .q-count { font-size:0.85em; color:var(--orange); background:rgba(255,107,43,0.1); padding:1px 8px; border-radius:10px; }
.timeline-row { display:flex; align-items:center; gap:12px; padding:8px 12px; border-radius:8px; background:var(--card); border:1px solid var(--border); margin-bottom:4px; cursor:pointer; transition:all 0.15s; }

.timeline-row.past { opacity:0.55; }

.timeline-meta { display:flex; gap:6px; flex-shrink:0; }
.timeline-badge { font-family:'Outfit',sans-serif; font-size:0.58em; font-weight:600; padding:2px 8px; border-radius:6px; background:var(--navy-light); color:var(--text-muted); }

let currentTierFilter = 'all';
let currentGenreFilter = 'all';
let currentStageFilter = 'all';
let currentSearch = '';
let activeCardId = null;
let currentImageIndex = 0;

const TIER_CONFIG = {
  AAA:   { color: 'var(--orange)', cls: 'tier-aaa', accent: 'var(--orange)' },
  AA:    { color: 'var(--cyan)',   cls: 'tier-aa',  accent: 'var(--cyan)' },
  A:     { color: 'var(--green)', cls: 'tier-a',   accent: 'var(--green)' },
  Indie: { color: 'var(--text-muted)', cls: 'tier-indie', accent: 'var(--text-muted)' },
};

const STAGE_STYLE = {
  '출시 완료': 'stage-launched',
  '알파/베타': 'stage-alpha',
  '데모/PT': 'stage-demo',
  '개발 중': 'stage-dev',
  '연기/미정': 'stage-delayed',
};

// ═══════════════════════════════════════════
//  HELPER FUNCTIONS
// ═══════════════════════════════════════════

function getFilteredGames() {
  return GAMES.filter(game => {
    const tierMatch = currentTierFilter === 'all' || game.tier === currentTierFilter;
    const genreMatch = currentGenreFilter === 'all' || game.genre === currentGenreFilter;
    const stageMatch = currentStageFilter === 'all' || game.stageGroup === currentStageFilter;
    const searchMatch = !currentSearch || 
      game.name.toLowerCase().includes(currentSearch.toLowerCase()) ||
      game.dev.toLowerCase().includes(currentSearch.toLowerCase());
    
    return tierMatch && genreMatch && stageMatch && searchMatch;
  });
}

function groupGamesByTier(games) {
  const tierOrder = ['AAA', 'AA', 'A', 'Indie'];
  const grouped = {};
  
  tierOrder.forEach(tier => {
    grouped[tier] = games.filter(g => g.tier === tier);
  });
  
  return tierOrder
    .map(tier => ({
      tier,
      games: grouped[tier]
    }))
    .filter(group => group.games.length > 0);
}

function getBusinessModelClass(bm) {
  if (!bm) return '';
  const lower = bm.toLowerCase();
  if (lower.includes('f2p')) return 'chip-bm-f2p';
  if (lower.includes('b2p') || lower.includes('$')) return 'chip-bm-b2p';
  return '';
}

function formatFollowers(n) {
  if (!n) return null;
  if (n >= 1000) return (n / 1000).toFixed(1).replace(/\.0$/, '') + 'K';
  return String(n);
}

function getStageClass(stageGroup) {
  return STAGE_STYLE[stageGroup] || 'stage-dev';
}

function createGameCardHTML(game, tierConfig) {
  const isActive = game.id === activeCardId ? 'active' : '';
  const statusBadge = game.status === '출시완료' 
    ? '<span class="meta-chip chip-status-live">✓ 출시완료</span>' 
    : '';
  
  const hasImage = game.images && game.images.length > 0 && !game.images[0].startsWith('data:image/svg');
  const thumbnailHTML = hasImage
    ? `<div class="card-thumbnail"><img src="${game.images[0]}" alt="${game.name}" loading="lazy"></div>`
    : `<div class="card-thumbnail"><div class="no-img">스크린샷 준비 중</div></div>`;

  const followersChip = game.followers 
    ? `<span class="meta-chip chip-followers">
        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        ${formatFollowers(game.followers)}
       </span>` 
    : '';

  const stageBadge = `<span class="stage-badge ${getStageClass(game.stageGroup)}">${game.stage}</span>`;
  
  return `
    <div class="game-card ${isActive}" data-id="${game.id}" style="--card-accent:${tierConfig.accent}">
      ${thumbnailHTML}
      <div class="card-content">
        <span class="card-tier ${tierConfig.cls}">${game.tier}</span>
        ${stageBadge}
        <div class="card-name">${game.name}</div>
        <div class="card-dev"><span class="dev-tooltip-wrap">${game.dev}${game.devPrevWorks ? `<span class="dev-tooltip"><strong>${game.dev}</strong><span class="prev-label">전작</span>${game.devPrevWorks}</span>` : ''}</span> · ${game.pub}</div>
        <div class="card-meta">
          <span class="meta-chip">
            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
            ${game.platform}
          </span>
          <span class="meta-chip chip-release">
            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
            ${game.release}
          </span>
          <span class="meta-chip ${getBusinessModelClass(game.bm)}">${game.bm}</span>
          ${followersChip}
          ${statusBadge}
        </div>
        <div class="card-genre">${game.genre}</div>
      </div>
    </div>
  `;
}

function createGalleryHTML(game) {
  if (!game.images || game.images.length === 0) {
    return `
      <div class="gallery-container">
        <div style="width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; color: var(--text-muted); font-size: 0.85em;">
          스크린샷 준비 중
        </div>
      </div>
    `;
  }

  const images = game.images.map((img, idx) => `
    <img src="${img}" alt="Screenshot ${idx + 1}" class="gallery-image ${idx === 0 ? 'active' : ''}" />
  `).join('');

  const dots = game.images.length > 1 ? `
    <div class="gallery-controls">
      ${game.images.map((_, idx) => `<div class="gallery-dot ${idx === 0 ? 'active' : ''}" data-index="${idx}"></div>`).join('')}
    </div>
  ` : '';

  const navButtons = game.images.length > 1 ? `
    <button class="gallery-nav prev">‹</button>
    <button class="gallery-nav next">›</button>
  ` : '';

  return `
    <div class="gallery-container">
      ${images}
      ${dots}
      ${navButtons}
    </div>
  `;
}

function renderGrid() {
  const container = document.getElementById('gridContainer');
  const games = getFilteredGames();
  
  if (games.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <p>검색 결과가 없습니다.</p>
      </div>
    `;
    return;
  }
  
  const groups = groupGamesByTier(games);
  container.innerHTML = groups.map(({ tier, games: tierGames }) => {
    const cfg = TIER_CONFIG[tier];
    const cards = tierGames.map(g => createGameCardHTML(g, cfg)).join('');
    return `
      <div class="section-label" style="color:${cfg.color}">
        ${tier} <span class="section-count" style="background:${cfg.color}22;color:${cfg.color}">${tierGames.length}</span>
      </div>
      <div class="card-grid">${cards}</div>
    `;
  }).join('');

  container.querySelectorAll('.game-card').forEach(el => {
    el.addEventListener('click', () => {
      const id = parseInt(el.dataset.id);
      openDetailPanel(id);
    });
  });
}

function setupGalleryControls(game) {
  if (!game.images || game.images.length <= 1) return;

  const dots = document.querySelectorAll('.gallery-dot');
  const images = document.querySelectorAll('.gallery-image');
  const prevBtn = document.querySelector('.gallery-nav.prev');
  const nextBtn = document.querySelector('.gallery-nav.next');

  const showImage = (index) => {
    images.forEach((img, i) => {
      img.classList.toggle('active', i === index);
    });
    dots.forEach((dot, i) => {
      dot.classList.toggle('active', i === index);
    });
    currentImageIndex = index;
  };

  if (prevBtn) {
    prevBtn.addEventListener('click', () => {
      const newIndex = (currentImageIndex - 1 + game.images.length) % game.images.length;
      showImage(newIndex);
    });
  }

  if (nextBtn) {
    nextBtn.addEventListener('click', () => {
      const newIndex = (currentImageIndex + 1) % game.images.length;
      showImage(newIndex);
    });
  }

  dots.forEach((dot, index) => {
    dot.addEventListener('click', () => showImage(index));
  });
}

function closeDetailPanel() {
  activeCardId = null;
  document.getElementById('detailPanel').classList.remove('open');
  document.getElementById('overlay').classList.remove('visible');
  document.getElementById('main').classList.remove('panel-open');
  renderGrid();
}

//  CALENDAR RENDERING
// ═══════════════════════════════════════════
let calYear = new Date().getFullYear();
let calMonth = new Date().getMonth() + 1;

function renderCalendar() {
  const container = document.getElementById('calendarContainer');
  const games = getFilteredGames();
  const today = new Date();
  let html = '';
  html += `<div class="cal-header">
    <div class="cal-nav">
      <button class="cal-nav-btn" onclick="calPrev()">◀</button>
      <div class="cal-month-label">${calYear}년 ${calMonth}월</div>
      <button class="cal-nav-btn" onclick="calNext()">▶</button>
      <button class="cal-nav-btn" onclick="calToday()" style="font-size:0.7em;width:auto;padding:0 10px;">Today</button>
    </div>
    <div class="cal-legend">
      <div class="cal-legend-item"><div class="cal-legend-dot" style="background:var(--orange)"></div> AAA</div>
      <div class="cal-legend-item"><div class="cal-legend-dot" style="background:var(--cyan)"></div> AA</div>
      <div class="cal-legend-item"><div class="cal-legend-dot" style="background:var(--green)"></div> A</div>
      <div class="cal-legend-item"><div class="cal-legend-dot" style="background:var(--text-muted)"></div> Indie</div>
    </div>
  </div>`;
  const firstDay = new Date(calYear, calMonth - 1, 1);
  const lastDay = new Date(calYear, calMonth, 0);
  const startDow = firstDay.getDay();
  const daysInMonth = lastDay.getDate();
  const dayNames = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
  html += `<div class="cal-grid">`;
  dayNames.forEach(d => { html += `<div class="cal-day-header">${d}</div>`; });
  for (let i = 0; i < startDow; i++) { html += `<div class="cal-cell empty"></div>`; }
  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = `${calYear}-${String(calMonth).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday = today.getFullYear() === calYear && (today.getMonth()+1) === calMonth && today.getDate() === d;
    const dayGames = games.filter(g => { const rd = RELEASE_DATES[g.id]; return rd && rd.exact && rd.date === dateStr; });
    html += `<div class="cal-cell ${isToday ? 'today' : ''}"><div class="cal-date">${d}</div><div class="cal-games">
      ${dayGames.map(g => { const tcls = g.tier==='AAA'?'t-aaa':g.tier==='AA'?'t-aa':g.tier==='A'?'t-a':'t-indie'; const isPast = new Date(dateStr)<today; return `<div class="cal-game-chip ${tcls} ${isPast?'released':''}" onclick="openDetailPanel(${g.id})" title="${g.name}">${g.name}</div>`; }).join('')}
    </div></div>`;
  }
  const endDow = lastDay.getDay();
  for (let i = endDow + 1; i < 7; i++) { html += `<div class="cal-cell empty"></div>`; }
  html += `</div>`;

  // Timeline
  html += `<div style="margin-top:32px;"><div class="section-label" style="color:var(--orange)">
    ${calYear}년 ${calMonth}월 출시 일정</div>`;
  const prefix = `${calYear}-${String(calMonth).padStart(2,'0')}`;
  const monthGames = games.filter(g => { const rd = RELEASE_DATES[g.id]; return rd && rd.date && rd.date.startsWith(prefix); });
  if (monthGames.length === 0) {
    html += `<div style="text-align:center;padding:24px;color:var(--text-muted);font-size:0.85em;">이 달에 예정된 출시 일정이 없습니다.</div>`;
  } else {
    monthGames.forEach(g => {
      const rd = RELEASE_DATES[g.id]; const cfg = TIER_CONFIG[g.tier]; const isPast = rd && rd.exact && new Date(rd.date) < today;
      html += `<div class="timeline-row ${isPast?'past':''}" onclick="openDetailPanel(${g.id})">
        <div class="timeline-date-col">${rd.exact ? rd.date.split('-').slice(1).join('/') : rd.label}</div>
        <div class="timeline-tier-dot" style="background:${cfg.color}"></div>
        <div class="timeline-name">${g.name}</div>
        <div class="timeline-meta"><span class="timeline-badge">${g.tier}</span>
        ${isPast ? '<span class="timeline-badge released">출시완료</span>' : ''}</div></div>`;
    });
  }
  html += `</div>`;

  // Full timeline
  html += renderFullTimeline(games, today);
  container.innerHTML = html;
}

function renderFullTimeline(games, today) {
  let html = `<div style="margin-top:32px;"><div class="section-label" style="color:var(--cyan)">전체 출시 타임라인 (2025~2027)</div>`;
  const buckets = {
    'released': { label:'출시완료', games:[], color:'var(--green)' },
    '2026-Q1': { label:'2026 Q1 (1~3월)', games:[], color:'var(--orange)' },
    '2026-Q2': { label:'2026 Q2 (4~6월)', games:[], color:'var(--orange)' },
    '2026-H2': { label:'2026 H2 (7~12월)', games:[], color:'var(--cyan)' },
    '2026-TBD': { label:'2026 TBD', games:[], color:'var(--text-muted)' },
    '2027': { label:'2027', games:[], color:'var(--text-muted)' },
    'delayed': { label:'연기 / 미정', games:[], color:'var(--red)' },
  };
  games.forEach(g => {
    const rd = RELEASE_DATES[g.id];
    if (!rd) { buckets['2026-TBD'].games.push(g); return; }
    if (!rd.date) { buckets['delayed'].games.push(g); return; }
    const d = rd.date;
    if (d === '2027') { buckets['2027'].games.push(g); return; }
    if (rd.exact && new Date(d) < today) { buckets['released'].games.push(g); return; }
    if (d.includes('Q1') || (rd.exact && d.startsWith('2026-0') && parseInt(d.split('-')[1]) <= 3)) { buckets['2026-Q1'].games.push(g); }
    else if (d.includes('Q2') || (rd.exact && d.startsWith('2026-0') && parseInt(d.split('-')[1]) <= 6 && parseInt(d.split('-')[1]) > 3)) { buckets['2026-Q2'].games.push(g); }
    else if (d.includes('Q3') || d.includes('Q4') || d.includes('H2') || (rd.exact && d.startsWith('2026-') && parseInt(d.split('-')[1]) > 6) || d === '2026-12') { buckets['2026-H2'].games.push(g); }
    else if (d === '2026') { buckets['2026-TBD'].games.push(g); }
    else if (rd.exact) { const m=parseInt(d.split('-')[1]); if(m<=3) buckets['2026-Q1'].games.push(g); else if(m<=6) buckets['2026-Q2'].games.push(g); else buckets['2026-H2'].games.push(g); }
    else { buckets['2026-TBD'].games.push(g); }
  });
  Object.entries(buckets).forEach(([key, bucket]) => {
    if (bucket.games.length === 0) return;
    html += `<div class="cal-quarter-row"><div class="cal-quarter-label" style="color:${bucket.color}">
      ${bucket.label} <span class="q-count" style="background:${bucket.color}22;color:${bucket.color}">${bucket.games.length}</span></div>`;
    bucket.games.forEach(g => {
      const rd = RELEASE_DATES[g.id]; const cfg = TIER_CONFIG[g.tier]; const isPast = rd && rd.exact && new Date(rd.date) < today;
      html += `<div class="timeline-row ${isPast?'past':''}" onclick="openDetailPanel(${g.id})">
        <div class="timeline-date-col">${rd ? (rd.exact ? rd.date : rd.label) : 'TBD'}</div>
        <div class="timeline-tier-dot" style="background:${cfg.color}"></div>
        <div class="timeline-name">${g.name}</div>
        <div class="timeline-meta"><span class="timeline-badge">${g.tier}</span><span class="timeline-badge">${g.bm}</span>
        ${isPast ? '<span class="timeline-badge released">출시완료</span>' : ''}
        ${key === 'delayed' ? '<span class="timeline-badge delayed">연기</span>' : ''}</div></div>`;
    });
    html += `</div>`;
  });
  html += `</div>`;
  return html;
}

function calPrev() { calMonth--; if(calMonth<1){calMonth=12;calYear--;} renderCalendar(); }
function calNext() { calMonth++; if(calMonth>12){calMonth=1;calYear++;} renderCalendar(); }
function calToday() { const t=new Date(); calYear=t.getFullYear(); calMonth=t.getMonth()+1; renderCalendar(); }
